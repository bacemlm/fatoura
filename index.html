<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Générateur Bon de Livraison</title>
<style>
@font-face {
  font-family: 'ReceiptFont';
  src: url('JMYZK-LZT.ttf') format('truetype');
  font-weight: normal;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:#e8e8e8;font-family:Arial,sans-serif;font-size:13px;display:flex;flex-direction:column;align-items:center;padding:20px;gap:20px}
h1{font-size:16px;color:#333}
.form-container{background:#fff;border:1px solid #ccc;border-radius:6px;padding:16px;width:100%;max-width:700px}
.form-container h2{font-size:12px;font-weight:700;color:#555;text-transform:uppercase;margin-bottom:8px;border-bottom:1px solid #eee;padding-bottom:5px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.grid3{display:grid;grid-template-columns:2fr 1fr 1fr;gap:8px}
.field{display:flex;flex-direction:column;gap:3px}
.field label{font-size:11px;color:#777}
.field input{border:1px solid #ccc;border-radius:3px;padding:5px 7px;font-size:12px;font-family:Arial}
.field input:focus{outline:none;border-color:#888}
.section-sep{border:none;border-top:1px solid #eee;margin:12px 0}
.btn-add{background:#333;color:#fff;border:none;border-radius:3px;padding:7px 16px;font-size:12px;cursor:pointer;margin-top:6px}
.btn-clear{background:#fff;color:#c00;border:1px solid #c00;border-radius:3px;padding:5px 12px;font-size:11px;cursor:pointer;margin-left:8px}
.btn-print{background:#1a1a1a;color:#fff;border:none;border-radius:4px;padding:10px;font-size:13px;cursor:pointer;width:100%;margin-top:12px}
.lines-table{width:100%;border-collapse:collapse;margin-top:8px;font-size:11px}
.lines-table th{background:#f5f5f5;text-align:left;padding:4px 6px;border:1px solid #ddd;font-weight:600}
.lines-table td{padding:3px 6px;border:1px solid #eee}
.del{background:none;border:none;color:#c00;cursor:pointer;font-size:14px;font-weight:700}
.totaux{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:10px}
.receipt-container{display:flex;flex-direction:column;align-items:center;width:100%;max-width:700px}
.receipt-label{font-size:11px;color:#666;margin-bottom:6px;text-transform:uppercase}

/* ===== CATALOGUE ===== */
.cat-search{width:100%;border:1px solid #ccc;border-radius:3px;padding:6px 8px;font-size:12px;font-family:Arial;margin-bottom:6px}
.cat-search:focus{outline:none;border-color:#888}
.cat-list{max-height:200px;overflow-y:auto;border:1px solid #eee;border-radius:3px}
.cat-item{display:flex;justify-content:space-between;align-items:center;padding:5px 8px;cursor:pointer;border-bottom:0.5px solid #f5f5f5;font-size:11.5px}
.cat-item:hover{background:#f0f7ff}
.cat-item .cat-nm{flex:1;color:#222}
.cat-item .cat-px{color:#555;margin:0 10px;white-space:nowrap}
.cat-item .cat-btn{background:#333;color:#fff;border:none;border-radius:2px;padding:2px 8px;font-size:11px;cursor:pointer}
.cat-item .cat-btn:hover{background:#555}
.cat-qty{width:60px;border:1px solid #ccc;border-radius:3px;padding:3px 5px;font-size:12px;font-family:Arial;margin-right:4px}

/* ===== RECEIPT ===== */
#receipt{
  background:#fff;
  color:#000;
  font-family:'ReceiptFont',monospace;
  font-size:11px;
  line-height:1.6;
  width:420px;
  padding:16px 16px 24px;
  border:1px solid #bbb;
  box-shadow:4px 4px 14px rgba(0,0,0,.22);
}
#receipt .hdr { text-align:left; font-size:11px; line-height:1.55; }
#receipt .hdr-name { font-weight:100; font-size:11px; }
#receipt .bl-title { text-align:center; font-size:20px; font-weight:700; margin:10px 0 8px; line-height:1.5; }
#receipt .b { font-weight:700; }
#receipt .dashed { border-top:1px dashed #000; margin:5px 0; }
#receipt .solid  { border-top:1px solid #000;  margin:5px 0; }
#receipt .solid2 { border-top:2px solid #eae8e8; margin:5px 0; width:55%; float:right;}
#receipt table{ width:100%; border-collapse:collapse; font-size:10.5px; table-layout:fixed; margin:3px 0;}
#receipt table th{ font-weight:100; padding:2px 1px; border-bottom:1px solid #f1f1f1;}
#receipt table th.l, #receipt table td.l { text-align:left; }
#receipt table td { padding:1px 1px; text-align:right; vertical-align:top; overflow:hidden; white-space:nowrap; }
#receipt table td.l { white-space:normal; }
#receipt table col:nth-child(1){width:24px}
#receipt table col:nth-child(2){width:auto}
#receipt table col:nth-child(3){width:26px}
#receipt table col:nth-child(4){width:20px}
#receipt table col:nth-child(5){width:44px}
#receipt table col:nth-child(6){width:46px}
#receipt .tot-wrap { font-size:10.5px; margin-top:4px; }
#receipt .tot-table { width:100%; border-collapse:collapse; font-size:10.5px; }
#receipt .tot-table td { padding:1px 3px; }
#receipt .tot-table td:nth-child(1) { text-align:left; width:40%; }
#receipt .tot-table td:nth-child(2) { text-align:left; width:25%; }
#receipt .tot-table td.tr { text-align:right; width:25%; white-space:nowrap; }
#receipt .net { display:flex; justify-content:space-between; align-items:baseline; font-size:14.5px; font-weight:700; padding:4px 0 2px;}
#receipt .sig    { font-size:11px; margin-top:14px; }
#receipt .footer { font-size:9.5px; text-align:right; margin-top:16px; }

@media print{
  body{background:#fff;padding:0;margin:0;display:block}
  .form-container,.receipt-label,.receipt-container>.receipt-label{display:none}
  .receipt-container{display:block;width:100%}
  #receipt{box-shadow:none;border:none;margin:0;padding:3mm 2mm;width:88mm !important;font-size:10.5px !important;line-height:1.5 !important;}
  #receipt .hdr { font-size:9.5px !important; }
  #receipt .bl-title { font-size:12px !important; }
  #receipt table { font-size:9px !important; }
  #receipt .tot-table { font-size:9.5px !important; }
  #receipt .net { font-size:12px !important; }
  @page{size:80mm auto;margin:0mm;}
}
</style>
</head>

let lines = [];

function fmt(v){return v.toFixed(3).replace('.',',');}
function fmtP(v){return v.toFixed(4).replace('.',',');}
function g(id){return document.getElementById(id);}
function gv(id){return g(id).value;}

// ===== CATALOGUE =====
function filterCat(){
  let q = g('cat-search').value.toLowerCase();
  renderCat(q);
}

function renderCat(q=''){
  let filtered = q ? CATALOGUE.filter(p=>p.n.toLowerCase().includes(q)) : CATALOGUE;
  g('cat-list').innerHTML = filtered.map((p,i)=>`
    <div class="cat-item">
      <span class="cat-nm">${p.n}</span>
      <span class="cat-px">${p.p.toFixed(3)}</span>
      <input class="cat-qty" type="number" min="1" value="1" id="qty_${i}" style="width:55px"/>
      <button class="cat-btn" onclick="addFromCat('${p.n.replace(/'/g,"\\'")}',${p.p},${i})">+ Ajouter</button>
    </div>`).join('');
}

function addFromCat(name, price, idx){
  let qtyEl = document.getElementById('qty_'+idx);
  let q = parseFloat(qtyEl ? qtyEl.value : 1) || 1;
  // Check if already exists — update qty
  let existing = lines.find(l=>l.n===name);
  if(existing){ existing.q += q; }
  else { lines.push({n:name, q:q, p:price}); }
  renderTable();
  render();
}

// ===== LINES TABLE =====
function renderTable(){
  g('ltbody').innerHTML = lines.map((l,i)=>`
    <tr>
      <td>${i+1}</td><td>${l.n}</td>
      <td style="text-align:right">${l.q}</td>
      <td style="text-align:right">${l.p.toFixed(4)}</td>
      <td style="text-align:right">${fmt(l.q*l.p)}</td>
      <td style="text-align:center"><button class="del" onclick="delLine(${i})">✕</button></td>
    </tr>`).join('');
}

function delLine(i){lines.splice(i,1);renderTable();render();}

// ===== RENDER RECEIPT =====
function render(){
  if(!lines.length){
    g('receipt').innerHTML='<div style="text-align:center;padding:20px;color:#999;font-family:Arial">Ajoutez des articles...</div>';
    return;
  }
  let totalTTC=lines.reduce((s,l)=>s+l.q*l.p,0);
  let av=parseFloat(g('f_av').value)||0;
  let rem=parseFloat(g('f_rem').value)||0;
  let extra=parseFloat(g('f_extra').value)||0;
  let eamt=parseFloat(g('f_eamt').value)||0;
  let netTTC=totalTTC+eamt;
  let net=netTTC+extra+av-rem;

  let rows=lines.map((l,i)=>{
    let nm=l.n.length>22?l.n.substring(0,22):l.n;
    return `<tr>
      <td class="l">[${i+1}]</td>
      <td class="l">${nm}</td>
      <td>${l.q}</td>
      <td>0</td>
      <td>${fmtP(l.p)}</td>
      <td>${fmt(l.q*l.p)}</td>
    </tr>`;
  }).join('');

  let now=new Date();
  let hm=now.toTimeString().substring(0,5);
  let dd=String(now.getDate()).padStart(2,'0');
  let mo=String(now.getMonth()+1).padStart(2,'0');
  let yy=now.getFullYear();
  let ts=`${dd}/${mo}/${yy} ${hm}`;

  let extraRow=extra>0?`<tr><td></td><td class="tl">Frais sup.</td><td class="tr">${fmt(extra)}</td></tr>`:'';
  let transp=gv('transp')?`<div>Transp.: ${gv('transp')}</div>`:'';

  g('receipt').innerHTML=`
<div class="hdr">
  <div class="hdr-name">${gv('soc')}</div>
  <div>${gv('adr')}</div>
  <div>${gv('mf')}</div>
  <div>${gv('tel')}</div>
</div>
<br>
<div class="bl-title">
  <div style="font-size:18px;">Bon de livraison : ${gv('bl')}</div>
  <div style="font-size:18px;">Du : ${gv('date')}</div>
</div>
<br>
<div class="b ul">CLIENT</div>
<div>${gv('cli')}</div>
<div>Adresse : ${gv('acli')} &nbsp; | &nbsp; MF: ${gv('mfcli')}</div>
${transp}
<br>
<table>
<colgroup><col/><col/><col/><col/><col/><col/></colgroup>
<thead>
<tr>
  <th class="l" colspan="2">Article</th>
  <th>Qte</th><th>CAS</th><th>PU</th><th>Montant</th>
</tr>
</thead>
<tbody>${rows}</tbody>
</table>
<br>
<div class="tot-wrap">
  <table class="tot-table">
    <tr>
      <td class="tl">Nombre de lignes: ${lines.length}</td>
      <td class="tl">Total TTC</td>
      <td class="tr">${fmt(netTTC)}</td>
    </tr>
    <tr><td></td><td class="tl">AV</td><td class="tr">${fmt(av)}</td></tr>
    ${extraRow}
    <tr><td></td><td class="tl">Remise &amp; autres</td><td class="tr">${fmt(rem)}</td></tr>
  </table>
</div>
<div class="solid2" style="margin-top:6px"></div>
<table class="tot-table">
  <tr>
    <td></td>
    <td class="tl" style="font-size:12px;font-weight:700;">NET A PAYER</td>
    <td class="tr" style="font-size:12px;font-weight:700;">${fmt(net)}</td>
  </tr>
</table>
<div class="sig">Signature client</div>
<div class="footer">Imprime le ${ts}</div>`;
}

['soc','adr','mf','tel','bl','date','cli','acli','mfcli','transp'].forEach(id=>{
  g(id).addEventListener('input',render);
});

renderCat();
render();
</script>
</body>
</html>
